[username]
style_user = 'green'
style_root = 'red bold'
format = '[ $user]($style)'
show_always = true

[hostname]
format = ' at [$ssh_symbol$hostname]($style)'
ssh_symbol = '󰣀 '
ssh_only = false
style = 'blue'

[directory]
format = ' in [$path]($style)[$read_only]($read_only_style)'
style = 'cyan'
truncation_length = 5
truncation_symbol = '…/'
read_only = '  '
read_only_style = 'red'

[vcs]
order = ['git', 'hg', 'pijul', 'fossil']

[git_branch]
symbol = ''
format = ' on [$symbol $branch(:$remote_branch)]($style)'
style = 'magenta'

[git_status]
format = ' [$all_status$ahead_behind]($style)'
style = 'yellow'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'

[git_state]
format = ' [\($state( $progress_current/$progress_total)\)]($style)'
style = 'yellow bold'

[container]
format = ' in [$symbol $name]($style)'
symbol = ''
style = 'red dimmed'

[nix_shell]
format = ' via [❄ $state( \($name\))]($style)'
style = 'blue'

[shlvl]
disabled = false
threshold = 2
format = ' [$symbol $shlvl]($style)'
symbol = '󰹍'
style = 'yellow'

[sudo]
disabled = false
format = ' [as $symbol]($style)'
symbol = ''
style = 'yellow bold'

[shell]
disabled = false
format = ' [$indicator]($style)'
bash_indicator = 'bsh'
fish_indicator = 'fsh'
zsh_indicator = 'zsh'
powershell_indicator = 'psh'
pwsh_indicator = 'pwsh'
cmd_indicator = 'cmd'
nu_indicator = 'nu'
unknown_indicator = '?sh'
style = 'white dimmed'

[fill]
symbol = ' '

[python]
format = ' [$symbol $version]($style)( [\($virtualenv\)]($style))'
symbol = '󰌠'
style = 'yellow'
python_binary = 'python3'

[rust]
format = ' [$symbol $version]($style)'
symbol = '󱘗'
style = 'red'

[dotnet]
format = ' [$symbol $version]($style)( [→$tfm](blue dimmed))'
symbol = ''
style = 'blue'

[c]
format = ' [$symbol $version( $name)]($style)'
symbol = ''
style = 'cyan'

[nodejs]
format = ' [$symbol $version]($style)'
symbol = ''
style = 'green'

[docker_context]
format = ' [$symbol $context]($style)'
symbol = '󰡨'
style = 'blue'

[aws]
format = ' [$symbol $profile(@$region)(\[$duration\])]($style)'
symbol = ''
style = 'yellow'

[gcloud]
format = ' [$symbol $active]($style)'
symbol = '󱇶'
style = 'blue'

[azure]
disabled = false
format = ' [$symbol $subscription]($style)'
symbol = '󰠅'
style = 'blue'

[kubernetes]
disabled = false
detect_files = ['kustomization.yaml', 'kustomization.yml', 'Chart.yaml', 'skaffold.yaml']
detect_folders = ['k8s', 'kubernetes', 'helm', '.helm']
detect_env_vars = ['KUBECONFIG']
format = ' [$symbol $context(/$namespace)]($style)'
symbol = '󱃾'
style = 'cyan bold'

[cmd_duration]
min_time = 2000
format = ' took [$duration](yellow)'

[status]
disabled = false
format = ' [$signal_name$common_meaning$maybe_int]($style)'
style = 'red'
symbol = ''
success_symbol = ''
recognize_signal_code = true

[jobs]
symbol = '✦'
format = ' [$symbol $number](blue)'
symbol_threshold = 1
number_threshold = 2

[character]
success_symbol = '[❯](green)'
error_symbol = '[❯](red)'
