"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
scan_timeout = 10
command_timeout = 500
follow_symlinks = false

format = """
$username\
$hostname\
$directory\
$vcs\
$container\
$nix_shell\
$shlvl\
$sudo\
$shell\
$fill\
$python\
$rust\
$dotnet\
$c\
$nodejs\
$docker_context\
$aws\
$gcloud\
$azure\
$kubernetes\
$cmd_duration\
$status\
$jobs\
$line_break\
$character\
"""

palette = "adwaita"

